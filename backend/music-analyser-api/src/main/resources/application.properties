spring.application.name=music-analyser-api

# Connexion Postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/music_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ClickHouse
# clickhouse.url=jdbc:clickhouse://localhost:8123/default
clickhouse.url=jdbc:clickhouse://localhost:8123/default?user=${DB_USER}&password=${DB_PASSWORD}